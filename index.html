<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta id="theme-meta" name="theme-color" content="#F2EBDC">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Iron Grimoire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Lora:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --parchment: #F2EBDC; --ink: #2B2B2B; --oxblood: #7B1818; --iron: #333333; }
        * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; -webkit-user-select: none; user-select: none; outline: none; }
        html, body { overscroll-behavior: none; background: var(--parchment); color: var(--ink); font-family: 'Inter', sans-serif; height: 100%; margin: 0; overflow: hidden; }
        h1, h2, h3, .font-serif { font-family: 'Lora', serif; }
        .grimoire-card { background: rgba(255, 255, 255, 0.4); border: 1px solid rgba(0,0,0,0.1); border-radius: 24px; }
        .btn-primary { background: var(--iron); color: var(--parchment); border-radius: 18px; padding: 20px; font-weight: 800; text-transform: uppercase; text-align: center; cursor: pointer; }
        .btn-endure { background: var(--oxblood); color: white; border-radius: 18px; padding: 22px; font-weight: 900; text-transform: uppercase; text-align: center; box-shadow: 0 4px 0px #4d0f0f; cursor: pointer; }
        .xp-bar { height: 100%; background: var(--iron); width: 0%; transition: width 1s ease; }
        .scroll-container { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 120px; }
        .quest-card { min-width: 240px; background: var(--ink); color: var(--parchment); border-radius: 20px; padding: 16px; margin-right: 12px; }
    </style>
</head>
<body class="p-6">

    <div id="onboarding" class="fixed inset-0 bg-[#F2EBDC] z-[2000] p-10 flex flex-col justify-center hidden">
        <h1 class="text-5xl font-bold italic font-serif mb-4">Iron Grimoire.</h1>
        <input type="text" id="name-input" placeholder="Warrior Name" class="text-4xl border-b-2 border-black/10 py-4 w-full focus:outline-none bg-transparent font-serif">
        <div onclick="saveName()" class="btn-primary mt-12">Initialize</div>
    </div>

    <div id="home-screen" class="flex flex-col h-full hidden">
        <header class="mb-6 pt-8 flex justify-between items-start px-2">
            <div><p class="text-[10px] uppercase opacity-40 font-black">Timeline: Dawn</p><h2 class="text-4xl font-serif italic">Warrior, <span id="display-name" class="opacity-30">---</span></h2></div>
            <div onclick="location.reload()" class="pill opacity-30 mt-2 text-[10px] bg-black/5 px-3 py-1 rounded-full uppercase font-black">Refresh</div>
        </header>
        
        <div class="scroll-container">
            <div class="mb-8"><h3 class="text-[9px] font-black mb-3 opacity-60 uppercase tracking-[0.4em] px-2">Guild Board</h3><div id="quest-board-container" class="flex overflow-x-auto px-2 pb-4"></div></div>
            <div class="px-2 mb-8" onclick="openProfile()"><div class="grimoire-card p-6"><div class="flex justify-between items-end mb-2"><div><h2 id="rank-title" class="font-bold font-serif text-xl">The Seeker</h2><p id="user-level" class="text-[10px] opacity-40 uppercase">Level 1</p></div><span id="xp-text" class="text-[9px] opacity-40 font-black">0/120 XP</span></div><div class="w-full bg-black/5 h-[6px] rounded-full overflow-hidden mt-4"><div id="xp-bar-fill" class="xp-bar"></div></div></div></div>
            <div class="px-2 mb-10"><div onclick="openBuilder()" class="grimoire-card p-6 flex justify-between items-center bg-white/60 cursor-pointer"><div><p class="font-bold font-serif text-lg">Custom Expedition</p><p class="text-[8px] opacity-40 uppercase">Draft your own arts</p></div><div class="bg-black text-white px-4 py-2 rounded-full text-[10px] font-black uppercase">Draft</div></div></div>
            <div onclick="resetApp()" class="text-center opacity-20 text-[10px] uppercase font-black tracking-widest mt-10">Burn Grimoire (Reset)</div>
        </div>
    </div>

    <div id="workout-ui" class="fixed inset-0 bg-[#F2EBDC] z-[70] p-6 hidden flex flex-col">
        <header class="flex justify-between items-center pt-8 mb-6"><div onclick="location.reload()" class="text-[10px] uppercase font-black opacity-40">Retreat</div><span id="global-clock" class="text-xs font-black">00:00</span><div class="opacity-0">---</div></header>
        <div class="flex-1 overflow-y-auto px-2">
            <h2 id="ex-name" class="text-3xl font-bold font-serif italic mb-1">---</h2>
            <p id="ex-sub" class="text-xs opacity-40 border-b border-black/5 pb-4 mb-8">---</p>
            <div class="grid grid-cols-2 gap-10 mb-12">
                <div class="text-center"><label class="text-[9px] opacity-40 font-black block mb-2 uppercase">KG</label><input type="number" id="weight-input" class="text-6xl w-full font-bold focus:outline-none"></div>
                <div class="text-center"><label class="text-[9px] opacity-40 font-black block mb-2 uppercase">Reps</label><input type="number" id="reps-input" class="text-6xl w-full font-bold focus:outline-none"></div>
            </div>
            <button onclick="logSet()" class="w-full btn-endure">Endure</button>
            <div id="trial-history" class="mt-10 space-y-3"></div>
        </div>
        <footer class="pt-4 border-t border-black/5 pb-[env(safe-area-inset-bottom)]"><div onclick="nextArt()" class="btn-primary">Advance</div></footer>
    </div>

    <div id="profile-window" class="fixed inset-0 bg-[#F2EBDC] z-[80] p-6 hidden flex flex-col">
        <header class="flex justify-between items-center pt-8 mb-8"><h2 class="text-2xl font-serif italic">Chronicles</h2><div onclick="closeProfile()" class="text-[10px] font-black uppercase opacity-40">Back</div></header>
        <div id="chronicles-list" class="flex-1 overflow-y-auto space-y-4"></div>
    </div>

    <script>
        const LIB = [
            { en: "Pushups", group: "Chest" }, { en: "Bench Press", group: "Chest" },
            { en: "Pull-ups", group: "Back" }, { en: "Barbell Row", group: "Back" },
            { en: "Barbell Squat", group: "Legs" }, { en: "Deadlift", group: "Back" }
        ];
        const QUESTS = [
            { id: 'q1', name: 'Clear Cellar', rank: 'Novice', arts: ['Pushups', 'Barbell Squat', 'Pull-ups'] },
            { id: 'q2', name: 'Iron Golem', rank: 'Adept', arts: ['Bench Press', 'Barbell Row', 'Barbell Squat'] }
        ];

        let state = {
            name: localStorage.getItem('grimoire-name') || "",
            level: parseInt(localStorage.getItem('grimoire-level')) || 1,
            xp: parseInt(localStorage.getItem('grimoire-total-xp')) || 0
        };

        let activeEx = [], currentIdx = 0, sessionLog = [];

        window.onload = () => {
            if (!state.name) { document.getElementById('onboarding').classList.remove('hidden'); }
            else { 
                document.getElementById('display-name').textContent = state.name;
                document.getElementById('home-screen').classList.remove('hidden');
                updateUI(); buildBoard();
            }
        };

        function updateUI() {
            const req = 100 + (state.level * 20);
            document.getElementById('xp-text').textContent = `${state.xp % req} / ${req} XP`;
            document.getElementById('xp-bar-fill').style.width = `${((state.xp % req) / req) * 100}%`;
            localStorage.setItem('grimoire-level', state.level);
            localStorage.setItem('grimoire-total-xp', state.xp);
        }

        function buildBoard() {
            document.getElementById('quest-board-container').innerHTML = QUESTS.map(q => `
                <div onclick="startEx('${q.id}')" class="quest-card shrink-0">
                    <h4 class="font-serif font-bold text-lg">${q.name}</h4>
                    <p class="text-[8px] opacity-50 uppercase">${q.rank} Contract</p>
                </div>
            `).join('');
        }

        function startEx(id) {
            const q = QUESTS.find(x => x.id === id);
            activeEx = q.arts.map(n => LIB.find(l => l.en === n) || {en: n, group: "Art"});
            currentIdx = 0; sessionLog = [];
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('workout-ui').classList.remove('hidden');
            resetTrial();
        }

        function resetTrial() {
            document.getElementById('ex-name').textContent = activeEx[currentIdx].en;
            document.getElementById('ex-sub').textContent = activeEx[currentIdx].group.toUpperCase();
            document.getElementById('trial-history').innerHTML = '';
        }

        function logSet() {
            const w = document.getElementById('weight-input').value || 0;
            const r = document.getElementById('reps-input').value || 0;
            sessionLog.push({ art: activeEx[currentIdx].en, w, r });
            const row = document.createElement('div');
            row.className = "flex justify-between text-xs font-black uppercase opacity-30 border-b border-black/5 pb-2";
            row.innerHTML = `<span>Trial Log</span><span>${w}kg x ${r}</span>`;
            document.getElementById('trial-history').prepend(row);
            state.xp += 10; updateUI();
        }

        function nextArt() {
            if (currentIdx < activeEx.length - 1) { currentIdx++; resetTrial(); }
            else { conclude(); }
        }

        function conclude() {
            const ch = JSON.parse(localStorage.getItem('grimoire-chronicles') || "[]");
            ch.unshift({ date: new Date().toLocaleDateString(), arts: sessionLog });
            localStorage.setItem('grimoire-chronicles', JSON.stringify(ch));
            location.reload();
        }

        function openProfile() { 
            const ch = JSON.parse(localStorage.getItem('grimoire-chronicles') || "[]");
            document.getElementById('chronicles-list').innerHTML = ch.map(c => `
                <div class="grimoire-card p-5">
                    <p class="text-[10px] opacity-40 font-black mb-2">${c.date}</p>
                    ${c.arts.map(a => `<div class="flex justify-between text-[11px] opacity-70"><span>${a.art}</span><span>${a.w}kg x ${a.r}</span></div>`).join('')}
                </div>
            `).join('');
            document.getElementById('profile-window').classList.remove('hidden'); 
        }
        function closeProfile() { document.getElementById('profile-window').classList.add('hidden'); }
        function saveName() { const n = document.getElementById('name-input').value; if(n) { localStorage.setItem('grimoire-name', n); location.reload(); } }
        function resetApp() { if(confirm("Burn Grimoire?")) { localStorage.clear(); location.reload(); } }
        
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
    </script>
</body>
</html>
