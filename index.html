<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta id="theme-meta" name="theme-color" content="#F2EBDC">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Iron Grimoire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=Lora:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --parchment: #F2EBDC; --ink: #2B2B2B; --oxblood: #7B1818; --iron: #333333; }
        * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        html, body { background-color: var(--parchment); color: var(--ink); font-family: 'Inter', sans-serif; height: 100%; margin: 0; padding: 0; overflow: hidden; }
        h1, h2, h3, .font-serif { font-family: 'Lora', serif; }
        
        /* Ensure things aren't hidden if the script fails */
        #main-container { display: flex; flex-direction: column; height: 100%; padding: 24px; opacity: 0; transition: opacity 0.5s; }
        .is-ready #main-container { opacity: 1; }
        
        .btn-primary { background: var(--iron); color: var(--parchment); border-radius: 18px; padding: 20px; font-weight: 800; text-transform: uppercase; text-align: center; }
        .grimoire-card { background: rgba(255, 255, 255, 0.4); border: 1px solid rgba(0,0,0,0.1); border-radius: 24px; padding: 24px; }
        .xp-bar { height: 6px; background: var(--iron); width: 0%; transition: width 1s ease; border-radius: 10px; }
        .pill { background: rgba(0,0,0,0.05); padding: 8px 16px; border-radius: 100px; font-size: 9px; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="main-container">
        <header class="mb-6 pt-8 flex justify-between items-start shrink-0">
            <div>
                <p class="text-[10px] uppercase opacity-40 font-black tracking-widest">Timeline: Dawn</p>
                <h2 class="text-4xl font-serif italic">Warrior, <span id="user-display-name" class="opacity-30">Seeker</span></h2>
            </div>
            <div onclick="resetApp()" class="pill opacity-30">Reset</div>
        </header>

        <div id="content-screen" class="flex-1 overflow-y-auto">
            <div class="grimoire-card mb-8">
                <div class="flex justify-between items-end mb-4">
                    <div>
                        <h2 class="text-xl font-bold font-serif italic" id="rank-title">The Seeker</h2>
                        <p class="text-[10px] opacity-40 uppercase font-black" id="level-label">Level 1</p>
                    </div>
                    <span class="text-[9px] opacity-40 font-black" id="xp-label">0 / 120 XP</span>
                </div>
                <div class="w-full bg-black/5 h-[6px] rounded-full overflow-hidden">
                    <div id="xp-bar-fill" class="xp-bar"></div>
                </div>
            </div>

            <div class="mb-8">
                <h3 class="text-[9px] font-black opacity-60 uppercase tracking-[0.3em] mb-4">The Guild Board</h3>
                <div id="quest-list" class="flex gap-4 overflow-x-auto pb-4">
                    </div>
            </div>

            <div onclick="alert('Builder coming back once boot is confirmed!')" class="grimoire-card flex justify-between items-center bg-white/60 cursor-pointer">
                <div>
                    <p class="font-bold font-serif text-lg">Custom Expedition</p>
                    <p class="text-[8px] opacity-40 uppercase">Draft your own arts</p>
                </div>
                <div class="pill bg-black text-white">Draft</div>
            </div>
        </div>
    </div>

    <div id="onboarding" class="fixed inset-0 bg-[#F2EBDC] z-[2000] p-10 flex flex-col justify-center hidden">
        <h1 class="text-5xl font-bold italic font-serif mb-4">Iron Grimoire.</h1>
        <p class="text-xs uppercase opacity-40 mb-12 tracking-widest">Inscribe your name.</p>
        <input type="text" id="name-input" placeholder="Name" class="text-4xl border-b-2 border-black/10 py-4 focus:outline-none bg-transparent font-serif">
        <div onclick="saveName()" class="btn-primary mt-12">Initialize</div>
    </div>

    <script>
        // 1. SELF-CLEANING LOGIC (Forces Safari to wake up)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                for(let registration of registrations) { registration.unregister(); }
            });
        }

        const CONFIG = { baseXp: 100, xpScaling: 20 };
        let state = {
            name: localStorage.getItem('grimoire-name') || "",
            level: parseInt(localStorage.getItem('grimoire-level')) || 1,
            xp: parseInt(localStorage.getItem('grimoire-total-xp')) || 0
        };

        const QUESTS = [
            { name: "Clear Cellar", rank: "Novice" },
            { name: "Iron Golem", rank: "Adept" },
            { name: "Behemoth", rank: "Veteran" }
        ];

        window.onload = () => {
            console.log("Grimoire Booting...");
            
            if (!state.name) {
                document.getElementById('onboarding').classList.remove('hidden');
            } else {
                document.getElementById('user-display-name').textContent = state.name;
                updateUI();
                renderQuests();
            }
            
            // Show the UI once logic is done
            document.body.classList.add('is-ready');
        };

        function updateUI() {
            const req = CONFIG.baseXp + (state.level * CONFIG.xpScaling);
            document.getElementById('level-label').textContent = `Level ${state.level}`;
            document.getElementById('xp-label').textContent = `${state.xp} / ${req} XP`;
            document.getElementById('xp-bar-fill').style.width = `${(state.xp / req) * 100}%`;
        }

        function renderQuests() {
            const list = document.getElementById('quest-list');
            list.innerHTML = QUESTS.map(q => `
                <div class="bg-black text-[#F2EBDC] p-5 rounded-2xl min-w-[200px]">
                    <h4 class="font-serif italic font-bold">${q.name}</h4>
                    <p class="text-[8px] opacity-50 uppercase mt-1">${q.rank}</p>
                </div>
            `).join('');
        }

        function saveName() {
            const val = document.getElementById('name-input').value.trim();
            if (val) {
                localStorage.setItem('grimoire-name', val);
                location.reload();
            }
        }

        function resetApp() {
            if (confirm("Burn the Grimoire?")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
