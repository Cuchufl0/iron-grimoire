        * { -ms-overflow-style: none; scrollbar-width: none; }
        
        html, body { 
            overscroll-behavior: none !important; touch-action: pan-y;
            background-color: var(--parchment); 
            color: var(--ink); 
            font-family: 'Inter', sans-serif;
            height: 100%;
            overflow: hidden;

        body::before {

            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            z-index: 9999;

        h1, h2, h3, .font-serif { font-family: 'Lora', serif; }

        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        .horizontal-scroll { display: flex; overflow-x: auto; gap: 0.5rem; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; touch-action: pan-x pan-y; }

            transition: 0.3s;
        }
