<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta id="theme-meta" name="theme-color" content="#F2EBDC">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Iron Grimoire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=Lora:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --parchment: #F2EBDC; --ink: #2B2B2B; --oxblood: #7B1818; --iron: #333333; }
        * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        *::-webkit-scrollbar { display: none; }
        html, body { overscroll-behavior: none; background-color: var(--parchment); color: var(--ink); font-family: 'Inter', sans-serif; height: 100%; overflow: hidden; margin: 0; }
        h1, h2, h3, .font-serif { font-family: 'Lora', serif; }
        input { -webkit-user-select: auto !important; user-select: auto !important; caret-color: var(--ink) !important; background: transparent !important; text-align: center; font-family: 'Lora', serif; }
        .grimoire-card { background: rgba(255, 255, 255, 0.4); border: 1px solid rgba(0,0,0,0.1); border-radius: 24px; box-shadow: inset 0 0 10px rgba(0,0,0,0.02); }
        .btn-primary { background: var(--iron); color: var(--parchment); border-radius: 18px; padding: 20px; font-weight: 800; text-transform: uppercase; text-align: center; cursor: pointer; }
        .btn-endure { background: var(--oxblood); color: white; border-radius: 18px; padding: 22px; font-weight: 900; text-transform: uppercase; text-align: center; box-shadow: 0 4px 0px #4d0f0f; }
        .rank-seal { width: 32px; height: 32px; background: var(--iron); color: var(--parchment); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; }
        .xp-bar { height: 6px; background: var(--iron); width: 0%; transition: width 1s ease; border-radius: 10px; }
        .scroll-container { flex: 1; overflow-y: auto; padding-bottom: calc(140px + env(safe-area-inset-bottom)); }
        #timer-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--ink); color: var(--parchment); padding: 40px 20px calc(40px + env(safe-area-inset-bottom)); transform: translateY(100%); transition: 0.5s; z-index: 9999; border-radius: 40px 40px 0 0; }
        #timer-bar.show { transform: translateY(0); }
        .pill { background: rgba(0,0,0,0.05); color: var(--ink); padding: 8px 16px; border-radius: 100px; font-size: 9px; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        .quest-card { min-width: 240px; background: var(--ink); color: var(--parchment); border-radius: 20px; padding: 16px; scroll-snap-align: start; }
    </style>
</head>
<body class="p-6">

    <div id="ui-shield" class="fixed inset-0 z-[9998] hidden bg-black/40 backdrop-blur-sm"></div>

    <div id="onboarding" class="fixed inset-0 bg-[#F2EBDC] z-[1000] p-10 flex flex-col justify-center hidden">
        <h1 class="text-5xl font-bold italic font-serif mb-4">Iron Grimoire.</h1>
        <p class="text-xs uppercase opacity-40 mb-12 tracking-widest">Inscribe your name.</p>
        <input type="text" id="name-input" placeholder="Name" class="text-4xl border-b-2 border-black/10 py-4 focus:outline-none bg-transparent font-serif">
        <div onclick="saveName()" class="btn-primary mt-12">Initialize</div>
    </div>

    <div id="home-screen" class="flex flex-col h-full hidden">
        <header class="mb-6 pt-8 flex justify-between items-start px-2">
            <div><p class="text-[10px] uppercase opacity-40 font-black">Timeline: Dawn</p><h2 class="text-4xl font-serif italic">Warrior, <span id="display-name" class="opacity-30">---</span></h2></div>
            <div onclick="resetApp()" class="pill opacity-30">Reset</div>
        </header>
        <div class="scroll-container">
            <div class="mb-8"><h3 class="text-[9px] font-black opacity-60 uppercase px-2 mb-3">Guild Board</h3><div id="quest-board-container" class="flex overflow-x-auto gap-4 px-2"></div></div>
            <div class="px-2 mb-8" onclick="openProfile()">
                <div class="grimoire-card p-6"><div class="flex justify-between items-end mb-2"><div class="flex items-center gap-3"><div id="home-rank-letter" class="rank-seal">E</div><div><h2 id="rank-title" class="font-bold font-serif">Seeker</h2><p id="user-level" class="text-[10px] opacity-40 uppercase">Level 1</p></div></div><span id="xp-text" class="text-[9px] opacity-40 font-black">0/120 XP</span></div><div class="w-full bg-black/5 h-[6px] rounded-full overflow-hidden mt-4"><div id="xp-bar-fill" class="xp-bar"></div></div></div>
            </div>
            <div class="px-2"><div onclick="openBuilder()" class="grimoire-card p-6 flex justify-between items-center bg-white/60"><div><p class="font-bold font-serif text-lg">Custom Expedition</p><p class="text-[8px] opacity-40 uppercase">Draft your own arts</p></div><div class="pill bg-black text-white">Draft</div></div></div>
            <div id="active-expeditions-container" class="mt-8 px-2 hidden"><h3 class="text-[9px] font-black opacity-60 uppercase mb-4">Saved Arts</h3><div id="expedition-list" class="space-y-4"></div></div>
        </div>
    </div>

    <div id="workout-ui" class="fixed inset-0 bg-[#F2EBDC] z-[70] p-6 hidden flex flex-col">
        <header class="flex justify-between items-center pt-8 mb-6"><div onclick="retreatClick()" class="pill text-red-800">Retreat</div><span id="global-clock" class="text-xs font-black">00:00</span><div onclick="openSwapModal()" class="pill">Swap</div></header>
        <div class="flex-1 overflow-y-auto">
            <div class="w-full h-48 grimoire-card mb-6 overflow-hidden flex items-center justify-center border-2 border-black/5"><img id="active-character" class="w-full h-full object-cover mix-blend-multiply opacity-80" onerror="this.style.opacity=0"></div>
            <h2 id="ex-name" class="text-2xl font-bold font-serif italic">---</h2>
            <p id="ex-sub" class="text-xs opacity-40 border-b border-black/5 pb-4 mb-6">---</p>
            <div class="grid grid-cols-2 gap-10 mb-8">
                <div class="text-center"><label class="text-[9px] opacity-40 font-black block mb-2 uppercase">Load (KG)</label><input type="number" id="weight-input" class="text-5xl w-full font-bold focus:outline-none"></div>
                <div class="text-center"><label class="text-[9px] opacity-40 font-black block mb-2 uppercase">Reps</label><input type="number" id="reps-input" class="text-5xl w-full font-bold focus:outline-none"></div>
            </div>
            <button onclick="logSet()" class="w-full btn-endure mb-10">Endure</button>
            <div id="trial-history" class="space-y-2"></div>
        </div>
        <footer class="pt-4 flex gap-4 border-t border-black/5 pb-[env(safe-area-inset-bottom)]">
            <div id="progress-text" class="flex-1 text-center text-[10px] opacity-30 font-black uppercase">1 / 4</div>
            <div onclick="nextArt()" class="flex-[2] btn-primary py-4 text-xs">Advance</div>
        </footer>
    </div>

    <script>
        // FULL RESTORATION LOGIC
        const CONFIG = { baseXp: 100, xpScaling: 20 };
        const RANKS = { E: "The Seeker", D: "The Disciple", C: "The Practitioner" };
        
        const fullLibrary = [
            { en: "Pushups", group: "Chest" }, { en: "Barbell Bench Press", group: "Chest" },
            { en: "Barbell Row", group: "Back" }, { en: "Dumbbell Row", group: "Back" },
            { en: "Overhead Press", group: "Shoulders" }, { en: "Barbell Squat", group: "Legs" },
            { en: "Tricep Dips", group: "Arms" }, { en: "Plank", group: "Core" }
        ];

        const QUESTS = [
            { id: 'q1', name: 'Clear the Cellar', rank: 'Novice', desc: 'Beginner Full Body.', arts: ['Pushups', 'Barbell Squat', 'Dumbbell Row', 'Plank'] },
            { id: 'q2', name: 'Forge Iron Golem', rank: 'Adept', desc: 'Heavy Push Day.', arts: ['Barbell Bench Press', 'Overhead Press', 'Tricep Dips'] }
        ];

        let state = {
            name: localStorage.getItem('grimoire-name') || "",
            level: parseInt(localStorage.getItem('grimoire-level')) || 1,
            xp: parseInt(localStorage.getItem('grimoire-total-xp')) || 0
        };

        let activeEx = [], currentIdx = 0, sessionLog = [], globalInt;

        window.onload = () => {
            if (!state.name) {
                document.getElementById('onboarding').classList.remove('hidden');
            } else {
                document.getElementById('display-name').textContent = state.name;
                document.getElementById('home-screen').classList.remove('hidden');
                updateUI(); buildBoard();
            }
        };

        function updateUI() {
            const req = CONFIG.baseXp + (state.level * CONFIG.xpScaling);
            document.getElementById('rank-title').textContent = RANKS[state.level >= 20 ? 'C' : state.level >= 10 ? 'D' : 'E'];
            document.getElementById('user-level').textContent = `Level ${state.level}`;
            document.getElementById('xp-label').textContent = `${state.xp % req} / ${req} XP`;
            document.getElementById('xp-bar-fill').style.width = `${((state.xp % req) / req) * 100}%`;
            localStorage.setItem('grimoire-level', state.level);
            localStorage.setItem('grimoire-total-xp', state.xp);
        }

        function buildBoard() {
            const container = document.getElementById('quest-board-container');
            container.innerHTML = QUESTS.map(q => `
                <div onclick="startExByName('${q.id}')" class="quest-card cursor-pointer shrink-0">
                    <h4 class="font-serif font-bold text-lg">${q.name}</h4>
                    <p class="text-[8px] opacity-50 uppercase mt-1">${q.rank} Contract</p>
                </div>
            `).join('');
        }

        function startExByName(id) {
            const q = QUESTS.find(x => x.id === id);
            const arts = q.arts.map(n => fullLibrary.find(l => l.en === n));
            startWorkout(arts);
        }

        function startWorkout(arts) {
            activeEx = arts; currentIdx = 0; sessionLog = [];
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('workout-ui').classList.remove('hidden');
            resetTrial();
        }

        function resetTrial() {
            const art = activeEx[currentIdx];
            document.getElementById('ex-name').textContent = art.en;
            document.getElementById('ex-sub').textContent = art.group;
            document.getElementById('progress-text').textContent = `${currentIdx+1} / ${activeEx.length}`;
            document.getElementById('trial-history').innerHTML = '';
        }

        function logSet() {
            const w = document.getElementById('weight-input').value || 0;
            const r = document.getElementById('reps-input').value || 0;
            sessionLog.push({ art: activeEx[currentIdx].en, w, r });
            const row = document.createElement('div');
            row.className = "flex justify-between text-xs opacity-50 border-b pb-1";
            row.innerHTML = `<span>Trial Log</span><span>${w}kg x ${r}</span>`;
            document.getElementById('trial-history').prepend(row);
            state.xp += 10; updateUI();
        }

        function nextArt() {
            if(currentIdx < activeEx.length - 1) { currentIdx++; resetTrial(); }
            else { location.reload(); }
        }

        function saveName() {
            const val = document.getElementById('name-input').value.trim();
            if (val) { localStorage.setItem('grimoire-name', val); location.reload(); }
        }

        function resetApp() { if(confirm("Burn the Grimoire?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
