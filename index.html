<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zen Gym Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { 
            -webkit-tap-highlight-color: transparent; 
            -webkit-touch-callout: none; 
            -webkit-user-select: none;   
            user-select: none;
            touch-action: manipulation;
        }

        html, body { 
            overscroll-behavior-y: none; 
            height: 100%; 
            overflow: hidden; 
            background-color: #fcfcfc;
        }

        body { font-family: 'Inter', sans-serif; color: #1a1a1a; display: flex; flex-direction: column; }
        
        input { 
            -webkit-user-select: auto !important; 
            user-select: auto !important; 
        }

        .scroll-container { 
            flex: 1; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
        }

        .press-effect {
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.1s ease;
        }
        .is-pressed {
            transform: scale(0.94) !important;
            background-color: #f0f0f0 !important;
        }
        .button-pressed {
            transform: scale(0.95) !important;
            opacity: 0.8 !important;
        }

        .bento-card { background: white; border: 1px solid #eee; border-radius: 24px; }
        .zen-button { background: #1a1a1a; color: white; border-radius: 16px; padding: 18px; width: 100%; font-weight: 600; text-align: center; }
        .secondary-button { background: #f0f0f0; color: #555; border-radius: 16px; padding: 18px; font-weight: 600; text-align: center; }
        
        /* New Pill Button Style for Quit/Cancel */
        .pill-button {
            background: #f3f3f3;
            color: #888;
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .selection-circle {
            width: 26px; height: 26px; border-radius: 50%;
            border: 2px solid #ddd; display: flex; align-items: center;
            justify-content: center; font-size: 13px; font-weight: 600;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: transparent;
        }
        .selection-circle.active {
            background: #1a1a1a; border-color: #1a1a1a; color: white;
            transform: scale(1.1);
        }
    </style>
</head>
<body class="p-6 pb-10">

    <div id="home-screen" class="flex flex-col h-full">
        <header class="mb-10 pt-6">
            <h1 id="time-greeting" class="text-[10px] tracking-[0.3em] uppercase text-gray-400 mb-2 font-black">Loading...</h1>
            <h2 class="text-3xl font-semibold tracking-tight italic">Zen Mode.</h2>
        </header>

        <div class="scroll-container">
            <div class="press-effect bento-card p-8 mb-10 border-gray-100 shadow-sm" onclick="startWorkout(fullRoutine)">
                <div class="flex justify-between items-center mb-6">
                    <span class="px-3 py-1 bg-gray-50 text-[10px] rounded-full uppercase tracking-widest font-bold text-gray-400">Routine</span>
                </div>
                <h3 class="text-2xl font-semibold mb-2">Biceps & Shoulders</h3>
                <p class="text-sm text-gray-400 mb-8 font-medium">Full Day 1 Sequence</p>
                <div class="zen-button">Start Workout</div>
            </div>

            <h3 class="text-[10px] font-black mb-6 text-gray-300 uppercase tracking-[0.2em]">Target Area</h3>
            <div class="grid grid-cols-2 gap-5">
                <div onclick="openSelection('Chest')" class="press-effect bento-card p-8 text-center text-sm font-bold tracking-tight">Chest</div>
                <div onclick="openSelection('Back')" class="press-effect bento-card p-8 text-center text-sm font-bold tracking-tight">Back</div>
                <div onclick="openSelection('Legs')" class="press-effect bento-card p-8 text-center text-sm font-bold tracking-tight">Legs</div>
                <div onclick="openSelection('Core')" class="press-effect bento-card p-8 text-center text-sm font-bold tracking-tight">Core</div>
            </div>
        </div>
    </div>

    <div id="selection-ui" class="fixed inset-0 bg-white z-40 p-6 hidden flex flex-col">
        <header class="mb-8 flex justify-between items-center pt-6">
            <h2 id="selection-title" class="text-3xl font-semibold">Select</h2>
            <div onclick="closeModal('selection-ui')" class="press-effect pill-button">Cancel</div>
        </header>
        <div id="exercise-list" class="scroll-container mb-6 px-1"></div>
        <div class="pb-6">
            <div onclick="startSelected()" class="press-effect zen-button">Start Selected</div>
        </div>
    </div>

    <div id="workout-ui" class="fixed inset-0 bg-white z-50 p-6 hidden flex flex-col">
        <div class="flex justify-between items-center mb-8 pt-6">
            <div onclick="closeModal('workout-ui')" class="press-effect pill-button">Quit</div>
            <span id="progress-text" class="text-[10px] font-black tracking-[0.2em] text-gray-300 uppercase">1 / 4</span>
            <div class="w-16"></div> </div>

        <div class="w-full h-56 bg-gray-50 rounded-[40px] flex items-center justify-center mb-10 border border-gray-100">
            <span class="text-[10px] uppercase tracking-widest text-gray-300 font-black">[ Anime Viz ]</span>
        </div>

        <h2 id="ex-name-en" class="text-2xl font-bold mb-1 tracking-tight">---</h2>
        <h3 id="ex-name-es" class="text-sm text-gray-300 mb-12 italic font-semibold">---</h3>

        <div class="flex gap-8 mb-12">
            <div class="flex-1">
                <label class="block text-[10px] uppercase text-gray-300 font-black mb-3 tracking-widest">Weight</label>
                <input type="number" id="weight-input" placeholder="0" class="w-full border-b-2 border-gray-100 py-2 focus:outline-none focus:border-black text-4xl font-light">
            </div>
            <div class="flex-1">
                <label class="block text-[10px] uppercase text-gray-300 font-black mb-3 tracking-widest">Reps</label>
                <input type="number" id="reps-input" placeholder="0" class="w-full border-b-2 border-gray-100 py-2 focus:outline-none focus:border-black text-4xl font-light">
            </div>
        </div>

        <div class="mt-auto grid grid-cols-2 gap-4 pb-6">
            <div id="back-btn" onclick="prevExercise()" class="press-effect secondary-button">Back</div>
            <div id="next-btn" onclick="nextExercise()" class="press-effect zen-button">Next</div>
        </div>
    </div>

    <script>
        // Haptic Feedback Logic
        document.addEventListener('touchstart', (e) => {
            const el = e.target.closest('.press-effect');
            if (el) el.classList.add(el.classList.contains('zen-button') ? 'button-pressed' : 'is-pressed');
        }, {passive: true});

        document.addEventListener('touchend', (e) => {
            const el = e.target.closest('.press-effect');
            if (el) el.classList.remove('is-pressed', 'button-pressed');
        }, {passive: true});

        const fullRoutine = [
            { en: "Alternating Dumbbell Curl", es: "Curl alterno con mancuerna", group: "Biceps" },
            { en: "Barbell Curl", es: "Curl con barra", group: "Biceps" },
            { en: "Concentration Curl", es: "Curl concentrado", group: "Biceps" },
            { en: "Dumbbell Military Press", es: "Press militar con mancuerna", group: "Shoulders" },
            { en: "Lateral Raises", es: "Elevaciones laterales", group: "Shoulders" },
            { en: "Front Raises", es: "Elevaciones frontales", group: "Shoulders" },
            { en: "Upper Crunches", es: "Abdominales Superiores", group: "Core" },
            { en: "Leg Raises", es: "Elevación de piernas", group: "Core" },
            { en: "Lying Oblique Crunch", es: "Crunch oblicuo acostado", group: "Core" }
        ];

        const library = [
            { en: "Bench Press", es: "Press de Banca", group: "Chest" },
            { en: "Incline Dumbbell Press", es: "Press Inclinado Mancuerna", group: "Chest" },
            { en: "Chest Flyes", es: "Aperturas de Pecho", group: "Chest" },
            { en: "Lat Pulldowns", es: "Jalón al Pecho", group: "Back" },
            { en: "Bent Over Rows", es: "Remo con Barra", group: "Back" },
            { en: "Deadlifts", es: "Peso Muerto", group: "Back" },
            { en: "Squats", es: "Sentadillas", group: "Legs" },
            { en: "Leg Press", es: "Prensa de Piernas", group: "Legs" },
            { en: "Lunges", es: "Zancadas", group: "Legs" }
        ];

        let activeSession = [];
        let currentIdx = 0;
        let selectedInMenu = [];
        let currentMuscleGroupOptions = [];

        function updateGreeting() {
            const hour = new Date().getHours();
            let g = "Night Session";
            if (hour < 12) g = "Morning Session";
            else if (hour < 18) g = "Afternoon Session";
            document.getElementById('time-greeting').innerText = g;
        }

        function openSelection(group) {
            document.getElementById('selection-title').innerText = group;
            currentMuscleGroupOptions = [...fullRoutine, ...library].filter(ex => ex.group === group);
            selectedInMenu = [];
            renderSelectionList();
            document.getElementById('selection-ui').classList.remove('hidden');
        }

        function renderSelectionList() {
            const listDiv = document.getElementById('exercise-list');
            listDiv.innerHTML = '';
            currentMuscleGroupOptions.forEach((ex) => {
                const orderIndex = selectedInMenu.findIndex(s => s.en === ex.en);
                const isActive = orderIndex > -1;
                const item = document.createElement('div');
                item.className = `flex items-center justify-between p-6 mb-4 bento-card press-effect ${isActive ? 'border-black' : ''}`;
                item.onclick = () => toggleEx(ex);
                item.innerHTML = `
                    <div>
                        <p class="text-md font-bold tracking-tight">${ex.en}</p>
                        <p class="text-[10px] text-gray-300 uppercase tracking-widest font-black">${ex.es}</p>
                    </div>
                    <div class="selection-circle ${isActive ? 'active' : ''}">${isActive ? (orderIndex + 1) : ''}</div>
                `;
                listDiv.appendChild(item);
            });
        }

        function toggleEx(exercise) {
            const idx = selectedInMenu.findIndex(s => s.en === exercise.en);
            if(idx > -1) selectedInMenu.splice(idx, 1);
            else selectedInMenu.push(exercise);
            renderSelectionList();
        }

        function startSelected() {
            if(selectedInMenu.length === 0) return;
            closeModal('selection-ui');
            startWorkout(selectedInMenu);
        }

        function startWorkout(exercises) {
            activeSession = exercises;
            currentIdx = 0;
            document.getElementById('workout-ui').classList.remove('hidden');
            updateUI();
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
        }

        function nextExercise() {
            if (currentIdx < activeSession.length - 1) {
                currentIdx++;
                updateUI();
            } else {
                alert("Session Finished.");
                closeModal('workout-ui');
            }
        }

        function prevExercise() {
            if (currentIdx > 0) {
                currentIdx--;
                updateUI();
            }
        }

        function updateUI() {
            const ex = activeSession[currentIdx];
            document.getElementById('ex-name-en').innerText = ex.en;
            document.getElementById('ex-name-es').innerText = ex.es;
            document.getElementById('progress-text').innerText = `${currentIdx + 1} / ${activeSession.length}`;
            document.getElementById('weight-input').value = "";
            document.getElementById('reps-input').value = "";
            document.getElementById('back-btn').style.visibility = (currentIdx === 0) ? 'hidden' : 'visible';
            document.getElementById('next-btn').innerText = (currentIdx === activeSession.length - 1) ? 'Finish' : 'Next';
        }

        updateGreeting();
    </script>
</body>
</html>
